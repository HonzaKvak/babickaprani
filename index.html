<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Pro babičku</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 140'%3E%3Cpath d='M50 78 C50 100 47 115 42 135' stroke='%235aa845' stroke-width='6' fill='none' stroke-linecap='round'/%3E%3Cellipse cx='50' cy='45' rx='32' ry='32' fill='%23eb789e'/%3E%3Cellipse cx='50' cy='45' rx='24' ry='24' fill='%23e0507a'/%3E%3Cellipse cx='50' cy='45' rx='16' ry='16' fill='%23c93866'/%3E%3Cellipse cx='50' cy='45' rx='9' ry='9' fill='%23f7a3c0'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(160deg, #fff5f8 0%, #ffe3ec 45%, #ffd1e0 100%);
    font-family: 'Quicksand', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
    overflow-x: hidden;
  }

  .card {
    max-width: 640px;
    width: 100%;
    text-align: center;
    position: relative;
    padding: 30px 10px;
  }

  .roses-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 6px;
  }

  .title {
    font-family: 'Great Vibes', cursive;
    font-size: 3.2rem;
    color: #c2185b;
    margin: 10px 0 4px 0;
    text-shadow: 1px 1px 2px rgba(194,24,91,0.15);
  }

  .subtitle {
    font-size: 1rem;
    color: #d16a94;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 30px;
  }

  .message {
    font-size: 1.35rem;
    line-height: 2;
    color: #5a3745;
    font-weight: 600;
    margin: 20px 0 30px 0;
    white-space: pre-line;
  }

  .icecream-row {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin: 20px 0 10px 0;
  }

  .signature {
    font-family: 'Great Vibes', cursive;
    font-size: 2.6rem;
    color: #ad1457;
    margin-top: 25px;
  }

  .from {
    font-size: 0.95rem;
    color: #a05070;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }

  .rose { width: 70px; height: auto; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.15)); }
  .rose.small { width: 44px; }
  .icecream { width: 60px; height: auto; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.15)); }

  .bottom-roses {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 30px;
  }

  .photo-slot {
    width: 420px;
    max-width: 90%;
    height: 320px;
    border-radius: 28px;
    margin: 30px auto 10px auto;
    overflow: hidden;
    border: 6px solid #fff;
    box-shadow: 0 6px 18px rgba(194,24,91,0.25);
    background: #fce0ea;
  }

  .photo-slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-8px) rotate(2deg); }
  }
  .rose { animation: float 4s ease-in-out infinite; }
  .rose:nth-child(2) { animation-delay: 0.5s; }
  .rose:nth-child(3) { animation-delay: 1s; }
  .rose:nth-child(4) { animation-delay: 1.5s; }
</style>
</head>

<div class="card">

  <div class="title">Všechno nejlepší!</div>

  <div class="message">Hodně štěstí milá babi,
hodně zdraví a hodně moci.

  <div class="from">S láskou</div>
  <div class="signature">Všechno nejlepší babičce přejí Kubišínek a Emička</div>

  <div class="photo-slot">
